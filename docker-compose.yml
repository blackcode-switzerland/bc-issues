services:
  postgres:
    image: postgres:16-alpine
    container_name: blackcode-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: blackcode_issues
      POSTGRES_USER: blackcode
      POSTGRES_PASSWORD: blackcode_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackcode -d blackcode_issues"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
